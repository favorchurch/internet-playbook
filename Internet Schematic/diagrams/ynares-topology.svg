<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 610" width="900" height="610">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444"/>
    </marker>
    <marker id="arr-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#20B2AA"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C0392B"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
      .title { font-size: 17px; font-weight: bold; fill: #222; text-anchor: middle; }
      .lbl  { font-size: 12px; fill: #222; text-anchor: middle; }
      .sub  { font-size: 10px; fill: #555; text-anchor: middle; }
      .edge { font-size: 9px;  fill: #666; }
      .section { font-size: 10px; font-weight: bold; fill: #555; text-anchor: middle; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="610" fill="#f8f8f8"/>

  <!-- Title -->
  <text x="450" y="26" class="title">Ynares Sports Arena — Network Topology (v6-2026-03-03)</text>

  <!-- ═══════════════════════════════════════════════════
       WAN SOURCES  (col 1, x=20)
  ═══════════════════════════════════════════════════ -->

  <!-- Starlink -->
  <rect x="20" y="52" width="115" height="50" rx="5" fill="#87CEEB" stroke="#2980B9" stroke-width="2"/>
  <text x="77" y="73" class="lbl">Starlink</text>
  <text x="77" y="89" class="sub">WAN 1</text>

  <!-- PLDT JIREH -->
  <rect x="20" y="125" width="115" height="50" rx="5" fill="#9B59B6" stroke="#6C3483" stroke-width="2"/>
  <text x="77" y="146" class="lbl" fill="#fff">PLDT H153</text>
  <text x="77" y="162" class="sub" fill="#fff">FVR JIREH / WAN 2</text>

  <!-- ═══════════════════════════════════════════════════
       ASUS ROG RAPTURE  (col 2, x=210)
  ═══════════════════════════════════════════════════ -->
  <rect x="205" y="65" width="150" height="78" rx="5" fill="#FF8C42" stroke="#C0550A" stroke-width="2"/>
  <text x="280" y="89"  class="lbl" fill="#111">ASUS ROG Rapture</text>
  <text x="280" y="106" class="sub" fill="#111">WiFi 7 · FVR MAIN</text>
  <text x="280" y="121" class="sub" fill="#111">10.3.66.1</text>

  <!-- WAN 1: Starlink → ASUS -->
  <line x1="135" y1="77" x2="205" y2="97" stroke="#2980B9" stroke-width="2" marker-end="url(#arr)"/>
  <text x="167" y="74" class="edge">WAN 1</text>

  <!-- WAN 2: JIREH → ASUS -->
  <line x1="135" y1="150" x2="205" y2="120" stroke="#6C3483" stroke-width="2" marker-end="url(#arr)"/>
  <text x="161" y="148" class="edge">WAN 2</text>

  <!-- ═══════════════════════════════════════════════════
       NETGEAR SWITCH  (col 3, x=430)
  ═══════════════════════════════════════════════════ -->
  <rect x="425" y="78" width="115" height="52" rx="5" fill="#888" stroke="#555" stroke-width="2"/>
  <text x="482" y="100" class="lbl" fill="#111">Netgear Switch</text>
  <text x="482" y="116" class="sub" fill="#111">8-port</text>

  <!-- ASUS LAN → Switch -->
  <line x1="355" y1="104" x2="425" y2="104" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <text x="388" y="99" class="edge">LAN</text>

  <!-- ═══════════════════════════════════════════════════
       AJA HELO  (col 4, x=608)
  ═══════════════════════════════════════════════════ -->
  <rect x="605" y="78" width="115" height="52" rx="5" fill="#E67E22" stroke="#A04000" stroke-width="2"/>
  <text x="662" y="100" class="lbl" fill="#111">AJA Helo</text>
  <text x="662" y="116" class="sub" fill="#111">DHCP → Restream</text>

  <!-- Switch → AJA -->
  <line x1="540" y1="100" x2="605" y2="100" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <text x="570" y="95" class="edge">LAN</text>

  <!-- ═══════════════════════════════════════════════════
       ARENA PCs  (below switch)
  ═══════════════════════════════════════════════════ -->
  <rect x="425" y="172" width="110" height="42" rx="5" fill="#1C3A70" stroke="#122550" stroke-width="2"/>
  <text x="480" y="190" class="lbl" fill="#fff">Arena PC</text>
  <text x="480" y="206" class="sub" fill="#aac">Propres</text>

  <rect x="575" y="172" width="110" height="42" rx="5" fill="#1C3A70" stroke="#122550" stroke-width="2"/>
  <text x="630" y="190" class="lbl" fill="#fff">Arena PC</text>
  <text x="630" y="206" class="sub" fill="#aac">vMix / Switcher</text>

  <!-- Switch → Propres -->
  <line x1="482" y1="130" x2="480" y2="172" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Switch → vMix -->
  <path d="M540,118 Q580,145 575,184" stroke="#444" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════
       MESH NODES  (below ASUS, 2 columns)
  ═══════════════════════════════════════════════════ -->
  <!-- Worship -->
  <rect x="205" y="200" width="88" height="42" rx="5" fill="#20B2AA" stroke="#148A83" stroke-width="2"/>
  <text x="249" y="218" class="lbl" fill="#111">X50 Mesh</text>
  <text x="249" y="234" class="sub" fill="#111">Worship</text>

  <!-- CRTVS -->
  <rect x="317" y="200" width="88" height="42" rx="5" fill="#20B2AA" stroke="#148A83" stroke-width="2"/>
  <text x="361" y="218" class="lbl" fill="#111">X50 Mesh</text>
  <text x="361" y="234" class="sub" fill="#111">CRTVS</text>

  <!-- Kids Check-in -->
  <rect x="205" y="270" width="88" height="42" rx="5" fill="#20B2AA" stroke="#148A83" stroke-width="2"/>
  <text x="249" y="288" class="lbl" fill="#111">X50 Mesh</text>
  <text x="249" y="304" class="sub" fill="#111">Kids Check-in</text>

  <!-- Heroes -->
  <rect x="317" y="270" width="88" height="42" rx="5" fill="#20B2AA" stroke="#148A83" stroke-width="2"/>
  <text x="361" y="288" class="lbl" fill="#111">X50 Mesh</text>
  <text x="361" y="304" class="sub" fill="#111">Heroes</text>

  <!-- Royals -->
  <rect x="205" y="340" width="88" height="42" rx="5" fill="#20B2AA" stroke="#148A83" stroke-width="2"/>
  <text x="249" y="358" class="lbl" fill="#111">X50 Mesh</text>
  <text x="249" y="374" class="sub" fill="#111">Royals</text>

  <!-- Babies -->
  <rect x="317" y="340" width="88" height="42" rx="5" fill="#20B2AA" stroke="#148A83" stroke-width="2"/>
  <text x="361" y="358" class="lbl" fill="#111">X50 Mesh</text>
  <text x="361" y="374" class="sub" fill="#111">Babies</text>

  <!-- IEM -->
  <rect x="261" y="410" width="88" height="42" rx="5" fill="#20B2AA" stroke="#148A83" stroke-width="2"/>
  <text x="305" y="428" class="lbl" fill="#111">X50 Mesh</text>
  <text x="305" y="444" class="sub" fill="#111">IEM</text>

  <!-- WiFi backhaul lines from ASUS bottom (280,143) -->
  <line x1="255" y1="143" x2="249" y2="200" stroke="#20B2AA" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-teal)"/>
  <line x1="270" y1="143" x2="361" y2="200" stroke="#20B2AA" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-teal)"/>
  <line x1="255" y1="143" x2="249" y2="270" stroke="#20B2AA" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-teal)"/>
  <line x1="270" y1="143" x2="361" y2="270" stroke="#20B2AA" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-teal)"/>
  <line x1="255" y1="143" x2="249" y2="340" stroke="#20B2AA" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-teal)"/>
  <line x1="270" y1="143" x2="361" y2="340" stroke="#20B2AA" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-teal)"/>
  <line x1="262" y1="143" x2="305" y2="410" stroke="#20B2AA" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-teal)"/>

  <!-- WiFi label -->
  <text x="204" y="175" class="edge" fill="#148A83">— — WiFi backhaul</text>

  <!-- ═══════════════════════════════════════════════════
       DEDICATED STREAM PATH  (right col, x=760)
       PLDT RESI  → Resi Encoder  (independent network)
  ═══════════════════════════════════════════════════ -->

  <!-- Dashed separator -->
  <line x1="748" y1="50" x2="748" y2="480" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="824" y="44" class="section">Stream Path</text>

  <!-- PLDT RESI -->
  <rect x="755" y="72" width="120" height="50" rx="5" fill="#9B59B6" stroke="#6C3483" stroke-width="2"/>
  <text x="815" y="93"  class="lbl" fill="#fff">PLDT H153</text>
  <text x="815" y="109" class="sub" fill="#fff">FVR RESI</text>

  <!-- Resi Encoder -->
  <rect x="755" y="170" width="120" height="52" rx="5" fill="#C0392B" stroke="#922B21" stroke-width="2"/>
  <text x="815" y="192" class="lbl" fill="#fff">Resi Encoder</text>
  <text x="815" y="208" class="sub" fill="#fff">10.6.33.5</text>

  <!-- PLDT RESI → Resi Encoder (direct, dedicated) -->
  <line x1="815" y1="122" x2="815" y2="170" stroke="#C0392B" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <text x="820" y="150" class="edge" fill="#C0392B">direct</text>

  <!-- ═══════════════════════════════════════════════════
       STANDALONE BACKUP SSIDs (bottom-left)
  ═══════════════════════════════════════════════════ -->
  <line x1="20" y1="480" x2="740" y2="480" stroke="#ddd" stroke-width="1"/>
  <text x="370" y="497" class="section">Standalone Backup SSIDs (independent from main network)</text>

  <rect x="20"  y="510" width="115" height="42" rx="5" fill="#9B59B6" stroke="#6C3483" stroke-width="1.5"/>
  <text x="77"  y="528" class="lbl" fill="#fff">Unicom 5G</text>
  <text x="77"  y="544" class="sub" fill="#fff">FVR UNICOM</text>

  <rect x="155" y="510" width="115" height="42" rx="5" fill="#9B59B6" stroke="#6C3483" stroke-width="1.5"/>
  <text x="212" y="528" class="lbl" fill="#fff">Unicom 5G</text>
  <text x="212" y="544" class="sub" fill="#fff">FVR SHILOH</text>

  <!-- ═══════════════════════════════════════════════════
       LEGEND
  ═══════════════════════════════════════════════════ -->
  <rect x="20" y="565" width="860" height="36" rx="4" fill="#eee" stroke="#ccc" stroke-width="1"/>
  <rect x="28"  y="574" width="14" height="14" rx="2" fill="#87CEEB" stroke="#2980B9" stroke-width="1"/>
  <text x="46"  y="585" class="edge">Starlink</text>
  <rect x="105" y="574" width="14" height="14" rx="2" fill="#9B59B6" stroke="#6C3483" stroke-width="1"/>
  <text x="123" y="585" class="edge">5G Router</text>
  <rect x="195" y="574" width="14" height="14" rx="2" fill="#FF8C42" stroke="#C0550A" stroke-width="1"/>
  <text x="213" y="585" class="edge">Main Router</text>
  <rect x="293" y="574" width="14" height="14" rx="2" fill="#888" stroke="#555" stroke-width="1"/>
  <text x="311" y="585" class="edge">Switch</text>
  <rect x="358" y="574" width="14" height="14" rx="2" fill="#20B2AA" stroke="#148A83" stroke-width="1"/>
  <text x="376" y="585" class="edge">WiFi Mesh</text>
  <rect x="448" y="574" width="14" height="14" rx="2" fill="#E67E22" stroke="#A04000" stroke-width="1"/>
  <text x="466" y="585" class="edge">AJA Helo</text>
  <rect x="524" y="574" width="14" height="14" rx="2" fill="#C0392B" stroke="#922B21" stroke-width="1"/>
  <text x="542" y="585" class="edge">Resi Encoder</text>
  <rect x="628" y="574" width="14" height="14" rx="2" fill="#1C3A70" stroke="#122550" stroke-width="1"/>
  <text x="646" y="585" class="edge">Arena PCs</text>

</svg>
